# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/bd_tourisme
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=SmartTripSecretKeyGroupe07FesMeknes2026VeryLongSecretKey!
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Trust X-Forwarded-* headers from the Railway reverse proxy so generated URLs use https
server.forward-headers-strategy=framework

# AI API
spring.application.name=tourisme
app.ai.api.url=http://localhost:5000
